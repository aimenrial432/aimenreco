name: Aimenreco Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Permite que terminen todas las versiones de Python aunque una falle
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock responses
          # Instalamos en modo editable para que las rutas internas funcionen
          pip install -e .

      - name: Run Pytest suite with Root Privileges
        run: |
          # Usamos sudo porque el CLI valida os.geteuid()
          sudo pytest tests/
